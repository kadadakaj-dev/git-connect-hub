name: Database Backup

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: '0 9 * * 5'  # Runs weekly on Friday at 09:00 UTC (10:00 Bratislava in winter / CET)
  workflow_dispatch:      # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DB_SESSION_POOLER_URL: ${{ secrets.DB_SESSION_POOLER_URL }}
        run: |
          if [ -z "$DB_SESSION_POOLER_URL" ]; then
            echo "::error::DB_SESSION_POOLER_URL secret is not set. Add the Supabase Session Pooler connection string (IPv4) under Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p backups
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          # Remove unsupported `pgbouncer` URI query param for libpq clients (pg_dump).
          DB_URI=$(echo "$DB_SESSION_POOLER_URL" \
            | sed -E 's/([?&])pgbouncer=[^&]*&?/\1/g' \
            | sed -E 's/[?&]$//; s/\?&/?/g')
          # Supabase uses port 6543 for the Transaction Pooler and port 5432 for the
          # Session Pooler.  pg_dump requires a Session Pooler connection; if the secret
          # was mistakenly set to the Transaction Pooler URL (port 6543) auto-correct it
          # and warn so the operator can fix the secret value.
          if echo "$DB_URI" | grep -qE ':6543(/|$)'; then
            echo "::warning::DB_SESSION_POOLER_URL uses port 6543 (Transaction Pooler). Switching to port 5432 (Session Pooler). Update the secret with the Session Pooler URL to silence this warning."
            DB_URI=$(echo "$DB_URI" | sed -E 's/:6543(\/|$)/:5432\1/')
          fi
          # Use Supabase Session Pooler URL (IPv4-compatible on GitHub-hosted runners).
          # Expected format:
          # postgres://postgres.<project-ref>:<password>@aws-<n>-<region>.pooler.supabase.com:5432/postgres
          pg_dump --dbname="${DB_URI}" -F c -b -v -f "backups/supabase_backup_${TIMESTAMP}.dump"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v6
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
