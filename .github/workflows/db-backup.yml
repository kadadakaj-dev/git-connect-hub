name: Database Backup

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: '0 9 * * 5'  # Runs weekly on Friday at 09:00 UTC (10:00 Bratislava in winter / CET)
  workflow_dispatch:      # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "::error::DB_PASSWORD secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p backups
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          # Resolve to an IPv4 address to avoid IPv6 connectivity issues on GitHub Actions runners
          DB_HOST=$(getent ahostsv4 db.gtefgucwbskgknsdirvj.supabase.co | awk 'NR==1{print $1}')
          if [ -z "$DB_HOST" ]; then
            echo "::error::Could not resolve db.gtefgucwbskgknsdirvj.supabase.co to an IPv4 address."
            exit 1
          fi
          pg_dump -h "${DB_HOST}" -U postgres -d postgres -p 5432 -F c -b -v -f "backups/supabase_backup_${TIMESTAMP}.dump"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
