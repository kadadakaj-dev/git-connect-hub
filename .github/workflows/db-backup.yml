name: Database Backup

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: '0 9 * * 5'  # Runs weekly on Friday at 09:00 UTC (10:00 Bratislava in winter / CET)
  workflow_dispatch:      # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DB_SESSION_POOLER_URL: ${{ secrets.DB_SESSION_POOLER_URL }}
        run: |
          if [ -z "$DB_SESSION_POOLER_URL" ]; then
            echo "::error::DB_SESSION_POOLER_URL secret is not set. Add the Supabase Session Pooler connection string (IPv4) under Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p backups
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          # Use Supabase Session Pooler URL (IPv4-compatible on GitHub-hosted runners).
          # Expected format:
          # postgres://postgres.<project-ref>:<password>@aws-<n>-<region>.pooler.supabase.com:5432/postgres
          pg_dump --dbname="${DB_SESSION_POOLER_URL}" -F c -b -v -f "backups/supabase_backup_${TIMESTAMP}.dump"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v6
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
